name: Unit Tests (reusable)

on:
  workflow_call:

# env:
#   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install PDM
        run: pip install pdm

      - name: Cache PDM packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pdm
          key: pdm-test-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: pdm-test-${{ runner.os }}-

      - name: Install test dependencies
        run: pdm install -dG test

      - name: Run unit tests
        run: pdm run test

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
