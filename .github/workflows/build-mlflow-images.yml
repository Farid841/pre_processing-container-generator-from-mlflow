name: Build, Push and Test MLflow Images

on:
  # Manual trigger  useful for testing without a MLflow webhook
  workflow_dispatch:
    inputs:
      run_id:
        description: 'MLflow run ID (required)'
        required: true
      model_source:
        description: 'MLflow model URI, e.g. models:/name@champion (leave empty for preprocessing only)'
        required: false
        default: ''

  # Automatic trigger fired by promote.py after @champion alias is set
  repository_dispatch:
    types: [mlflow-model-version]

env:
  REGISTRY: ghcr.io

jobs:

  unit-tests:
    uses: ./.github/workflows/_unit-tests.yml

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30
    environment: CI

    permissions:
      contents: read
      packages: write
      actions: write

    outputs:
      preprocessing_image: ${{ steps.image-names.outputs.preprocessing_image }}
      model_image:         ${{ steps.image-names.outputs.model_image }}
      image_tag:           ${{ steps.image-names.outputs.image_tag }}

    env:
      MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:       ${{ secrets.AWS_DEFAULT_REGION }}
      AWS_ENDPOINT_URL:         ${{ secrets.AWS_ENDPOINT_URL }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install PDM
        run: pip install pdm

      - name: Cache PDM packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pdm
          key: pdm-build-${{ runner.os }}-${{ hashFiles('pdm.lock') }}
          restore-keys: pdm-build-${{ runner.os }}-

      - name: Install build dependencies
        run: pdm install -G build

      - name: Verify MLflow connection
        run: |
          pdm run python -c "
          import mlflow, os, sys
          uri = os.environ.get('MLFLOW_TRACKING_URI', '')
          if not uri:
              print('ERROR: MLFLOW_TRACKING_URI is not set')
              sys.exit(1)
          mlflow.set_tracking_uri(uri)
          try:
              mlflow.search_experiments(max_results=1)
              print('MLflow connection OK')
          except Exception as e:
              print(f'MLflow connection FAILED: {e}')
              sys.exit(1)
          "

      - name: Extract build parameters
        id: params
        # Pass values through env vars
        env:
          WD_RUN_ID:       ${{ github.event.inputs.run_id }}
          WD_MODEL_SOURCE: ${{ github.event.inputs.model_source }}
          RD_RUN_ID:       ${{ github.event.client_payload.data.run_id }}
          RD_MODEL_SOURCE: ${{ github.event.client_payload.data.source }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_id=${WD_RUN_ID}"           >> $GITHUB_OUTPUT
            echo "model_source=${WD_MODEL_SOURCE}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${RD_RUN_ID}"           >> $GITHUB_OUTPUT
            echo "model_source=${RD_MODEL_SOURCE}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preprocessing image (+ model image if MODEL_SOURCE set)
        env:
          RUN_ID:       ${{ steps.params.outputs.run_id }}
          MODEL_SOURCE: ${{ steps.params.outputs.model_source }}
        run: |
          if [ -z "$RUN_ID" ]; then
            echo "ERROR: run_id is required but was not provided in the event payload"
            exit 1
          fi
          BUILD_ARGS="$RUN_ID"
          if [ -n "$MODEL_SOURCE" ]; then
            BUILD_ARGS="$BUILD_ARGS --model-source $MODEL_SOURCE"
          fi
          # Tags are auto-generated by build.sh: latest, v{version}, v{version}-{run_id[:8]}
          ./build.sh $BUILD_ARGS

      - name: Compute image names
        id: image-names
        env:
          RUN_ID:       ${{ steps.params.outputs.run_id }}
          MODEL_SOURCE: ${{ steps.params.outputs.model_source }}
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          IMAGE_INFO=$(pdm run python - <<'EOF'
          import mlflow, os, re, sys

          run_id = os.environ["RUN_ID"]
          model_source = os.environ.get("MODEL_SOURCE", "")
          mlflow.set_tracking_uri(os.environ.get("MLFLOW_TRACKING_URI", ""))

          try:
              run  = mlflow.get_run(run_id)
              name = (run.data.tags.get("model_name")
                      or run.data.tags.get("mlflow.runName")
                      or "unknown")
              ver  = (run.data.tags.get("version")
                      or run.data.tags.get("model_version")
                      or run_id[:8])
          except Exception as e:
              print(f"WARNING: could not fetch run metadata: {e}", file=sys.stderr)
              name, ver = "unknown", run_id[:8]

          clean = lambda s: re.sub(r"[^a-z0-9-]+", "-", s.lower()).strip("-")
          # model_image is only set when MODEL_SOURCE was provided (model build was requested)
          model_name = f"model-{clean(name)}" if model_source else ""
          print(f"preprocessing-{clean(name)}|{model_name}|v{clean(ver)}")
          EOF
          )

          PREPROCESSING_NAME=$(echo "$IMAGE_INFO" | cut -d'|' -f1)
          MODEL_NAME=$(echo "$IMAGE_INFO" | cut -d'|' -f2)
          VERSION_TAG=$(echo "$IMAGE_INFO" | cut -d'|' -f3)

          echo "preprocessing_image=ghcr.io/${REPO_LOWER}/${PREPROCESSING_NAME}:latest" >> $GITHUB_OUTPUT
          echo "image_tag=${VERSION_TAG}"                                               >> $GITHUB_OUTPUT
          if [ -n "$MODEL_NAME" ]; then
            echo "model_image=ghcr.io/${REPO_LOWER}/${MODEL_NAME}:latest"               >> $GITHUB_OUTPUT
          fi

  smoke-tests:
    name: Smoke Tests (Preprocessing Container)
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull preprocessing image
        run: docker pull "${{ needs.build-and-push.outputs.preprocessing_image }}"

      - name: Start preprocessing container
        run: |
          docker run -d \
            --name preprocessing-smoke \
            -p 8000:8000 \
            "${{ needs.build-and-push.outputs.preprocessing_image }}"

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Container is healthy (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 2
          done
          echo "Container did not become healthy within 60s"
          docker logs preprocessing-smoke
          exit 1

      - name: Smoke test - /health
        run: |
          RESP=$(curl -sf http://localhost:8000/health)
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') in ('ok', 'healthy'), f'Expected status=ok or healthy, got: {d}'
          print('PASS /health')
          "

      - name: Smoke test - /preprocess returns N_FEATURES floats
        run: |
          # Send a realistic ZTF AVRO alert and verify the output shape
          RESP=$(curl -sf -X POST http://localhost:8000/preprocess \
            -H "Content-Type: application/json" \
            -d '{
              "data": {
                "objectId": "ZTF21smoketest",
                "candid": 1234567890,
                "candidate": {
                  "rb": 0.92, "drb": 0.87, "classtar": 0.1,
                  "fwhm": 2.4, "elong": 1.02,
                  "magpsf": 19.3, "sigmapsf": 0.04,
                  "diffmaglim": 20.8, "ndethist": 3, "scorr": 12.1,
                  "chinr": 0.98, "sharpnr": 0.01,
                  "sgscore1": 0.7, "distpsnr1": 0.3,
                  "isdiffpos": "t"
                },
                "prv_candidates": [
                  {"jd": 2459995.5, "magpsf": 19.1, "isdiffpos": "t", "fid": 1},
                  {"jd": 2459990.3, "magpsf": 19.4, "isdiffpos": "t", "fid": 2}
                ]
              }
            }')
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          features = d.get('features') or d.get('result') or d.get('data') or d
          if isinstance(features, dict):
              features = list(features.values())
          assert isinstance(features, list), f'Expected a list of features, got: {type(features)}'
          assert len(features) == 18, f'Expected 18 features (N_FEATURES), got {len(features)}: {features}'
          assert all(isinstance(v, (int, float)) for v in features), f'All features must be numeric, got: {features}'
          print(f'PASS /preprocess - {len(features)} features returned')
          "

      - name: Smoke test - /preprocess/batch
        run: |
          RESP=$(curl -sf -X POST http://localhost:8000/preprocess/batch \
            -H "Content-Type: application/json" \
            -d '{
              "data": [
                {
                  "objectId": "ZTF21a", "candid": 1,
                  "candidate": {"rb": 0.9, "drb": 0.85, "magpsf": 19.0, "isdiffpos": "t"}
                },
                {
                  "objectId": "ZTF21b", "candid": 2,
                  "candidate": {"rb": 0.1, "drb": 0.05, "magpsf": 18.0, "isdiffpos": "f"}
                }
              ]
            }')
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          results = d.get('features') or d.get('result') or d.get('results') or d.get('data') or d
          assert isinstance(results, list), f'Expected a list, got: {type(results)}'
          assert len(results) == 2, f'Expected 2 results for 2 alerts, got {len(results)}'
          print(f'PASS /preprocess/batch - {len(results)} results returned')
          "

      - name: Show logs on failure
        if: failure()
        run: docker logs preprocessing-smoke

      - name: Cleanup
        if: always()
        run: |
          docker stop preprocessing-smoke 2>/dev/null || true
          docker rm   preprocessing-smoke 2>/dev/null || true

  smoke-tests-model:
    name: Smoke Tests (Model Container)
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only runs when a model image was built (MODEL_SOURCE was provided)
    if: ${{ needs.build-and-push.outputs.model_image != '' }}
    timeout-minutes: 30

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull model image
        run: docker pull "${{ needs.build-and-push.outputs.model_image }}"

      - name: Start model container (API only, no Kafka)
        run: |
          docker run -d \
            --name model-smoke \
            -p 8080:8080 \
            -e KAFKA_ENABLED=false \
            "${{ needs.build-and-push.outputs.model_image }}"

      - name: Wait for MLflow /ping
        run: |
          echo "Waiting for MLflow scoring server..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/ping > /dev/null; then
              echo "Model server ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/60..."
            sleep 5
          done
          echo "Model server did not start within 300s"
          docker logs model-smoke
          exit 1

      - name: Smoke test - /ping
        run: |
          RESP=$(curl -sf http://localhost:8080/ping)
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'alive', f'Expected status=alive, got: {d}'
          print('PASS /ping')
          "

      - name: Smoke test - /invocations (18 features)
        run: |
          # Send 18 preprocessed features (output shape of preprocessing container)
          RESP=$(curl -sf -X POST http://localhost:8080/invocations \
            -H "Content-Type: application/json" \
            -d '{
              "inputs": [[0.92, 0.87, 0.1, 2.4, 1.02, 19.3, 0.04, 20.8, 3, 12.1,
                          0.98, 0.01, 0.7, 0.3, 1.0, 0.0, 19.1, 19.4]]
            }')
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          predictions = d.get('predictions') or d.get('outputs') or d
          assert predictions is not None, f'No predictions in response: {d}'
          print(f'PASS /invocations - prediction: {predictions}')
          "

      - name: Show logs on failure
        if: failure()
        run: docker logs model-smoke

      - name: Cleanup
        if: always()
        run: |
          docker stop model-smoke 2>/dev/null || true
          docker rm   model-smoke 2>/dev/null || true
