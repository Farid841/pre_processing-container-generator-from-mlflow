name: Build, Push and Test MLflow Images

on:
  # Manual trigger — useful for testing without a MLflow webhook
  workflow_dispatch:
    inputs:
      run_id:
        description: 'MLflow run ID (required)'
        required: true
      model_source:
        description: 'MLflow model URI, e.g. models:/name@champion (leave empty for preprocessing only)'
        required: false
        default: ''

  # Automatic trigger — fired by promote.py after @champion alias is set
  repository_dispatch:
    types: [mlflow-model-version]

env:
  REGISTRY: ghcr.io

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Unit tests ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install PDM
        run: pip install pdm

      - name: Install test dependencies
        run: pdm install -dG test

      - name: Run unit tests
        run: pdm run test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  # ── 2. Build images and push to ghcr.io ───────────────────────────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    outputs:
      preprocessing_image: ${{ steps.image-names.outputs.preprocessing_image }}
      image_tag:           ${{ steps.image-names.outputs.image_tag }}

    env:
      MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:       ${{ secrets.AWS_DEFAULT_REGION }}
      AWS_ENDPOINT_URL:         ${{ secrets.AWS_ENDPOINT_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install PDM
        run: pip install pdm

      - name: Install build dependencies
        run: pdm install -G build

      - name: Verify MLflow connection
        run: |
          python3 -c "
          import mlflow, os, sys
          uri = os.environ.get('MLFLOW_TRACKING_URI', '')
          if not uri:
              print('ERROR: MLFLOW_TRACKING_URI is not set')
              sys.exit(1)
          mlflow.set_tracking_uri(uri)
          try:
              mlflow.search_experiments(max_results=1)
              print('MLflow connection OK')
          except Exception as e:
              print(f'MLflow connection FAILED: {e}')
              sys.exit(1)
          "

      - name: Extract build parameters
        id: params
        # Pass values through env vars to avoid shell injection
        env:
          WD_RUN_ID:       ${{ github.event.inputs.run_id }}
          WD_MODEL_SOURCE: ${{ github.event.inputs.model_source }}
          RD_RUN_ID:       ${{ github.event.client_payload.data.run_id }}
          RD_MODEL_SOURCE: ${{ github.event.client_payload.data.source }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_id=${WD_RUN_ID}"           >> $GITHUB_OUTPUT
            echo "model_source=${WD_MODEL_SOURCE}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${RD_RUN_ID}"           >> $GITHUB_OUTPUT
            echo "model_source=${RD_MODEL_SOURCE}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        env:
          RUN_ID:       ${{ steps.params.outputs.run_id }}
          MODEL_SOURCE: ${{ steps.params.outputs.model_source }}
        run: |
          BUILD_ARGS="$RUN_ID"
          if [ -n "$MODEL_SOURCE" ]; then
            BUILD_ARGS="$BUILD_ARGS --model-source $MODEL_SOURCE"
          fi
          # Tags are auto-generated by build.sh: latest, v{version}, v{version}-{run_id[:8]}
          ./build.sh $BUILD_ARGS

      - name: Compute image names
        id: image-names
        env:
          RUN_ID: ${{ steps.params.outputs.run_id }}
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          IMAGE_INFO=$(python3 - <<'EOF'
          import mlflow, os, re, sys

          run_id = os.environ["RUN_ID"]
          mlflow.set_tracking_uri(os.environ.get("MLFLOW_TRACKING_URI", ""))

          try:
              run  = mlflow.get_run(run_id)
              name = (run.data.tags.get("model_name")
                      or run.data.tags.get("mlflow.runName")
                      or "unknown")
              ver  = (run.data.tags.get("version")
                      or run.data.tags.get("model_version")
                      or run_id[:8])
          except Exception as e:
              print(f"WARNING: could not fetch run metadata: {e}", file=sys.stderr)
              name, ver = "unknown", run_id[:8]

          clean = lambda s: re.sub(r"[^a-z0-9-]+", "-", s.lower()).strip("-")
          # image name has no version — version lives in the tag
          print(f"preprocessing-{clean(name)}|v{clean(ver)}")
          EOF
          )

          IMAGE_NAME=$(echo "$IMAGE_INFO" | cut -d'|' -f1)
          VERSION_TAG=$(echo "$IMAGE_INFO" | cut -d'|' -f2)

          echo "preprocessing_image=ghcr.io/${REPO_LOWER}/${IMAGE_NAME}:latest"        >> $GITHUB_OUTPUT
          echo "image_tag=${VERSION_TAG}"                                                >> $GITHUB_OUTPUT

  # ── 3. Smoke tests ────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests (Preprocessing Container)
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull preprocessing image
        run: docker pull "${{ needs.build-and-push.outputs.preprocessing_image }}"

      - name: Start preprocessing container
        run: |
          docker run -d \
            --name preprocessing-smoke \
            -p 8000:8000 \
            "${{ needs.build-and-push.outputs.preprocessing_image }}"

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Container is healthy (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 2
          done
          echo "Container did not become healthy within 60s"
          docker logs preprocessing-smoke
          exit 1

      - name: Smoke test — /health
        run: |
          RESP=$(curl -sf http://localhost:8000/health)
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'ok', f'Expected status=ok, got: {d}'
          print('PASS /health')
          "

      - name: Smoke test — /preprocess returns N_FEATURES floats
        run: |
          # Send a realistic ZTF AVRO alert and verify the output shape
          RESP=$(curl -sf -X POST http://localhost:8000/preprocess \
            -H "Content-Type: application/json" \
            -d '{
              "data": {
                "objectId": "ZTF21smoketest",
                "candid": 1234567890,
                "candidate": {
                  "rb": 0.92, "drb": 0.87, "classtar": 0.1,
                  "fwhm": 2.4, "elong": 1.02,
                  "magpsf": 19.3, "sigmapsf": 0.04,
                  "diffmaglim": 20.8, "ndethist": 3, "scorr": 12.1,
                  "chinr": 0.98, "sharpnr": 0.01,
                  "sgscore1": 0.7, "distpsnr1": 0.3,
                  "isdiffpos": "t"
                },
                "prv_candidates": [
                  {"jd": 2459995.5, "magpsf": 19.1, "isdiffpos": "t", "fid": 1},
                  {"jd": 2459990.3, "magpsf": 19.4, "isdiffpos": "t", "fid": 2}
                ]
              }
            }')
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          features = d.get('features') or d.get('result') or d.get('data') or d
          if isinstance(features, dict):
              features = list(features.values())
          assert isinstance(features, list), f'Expected a list of features, got: {type(features)}'
          assert len(features) == 18, f'Expected 18 features (N_FEATURES), got {len(features)}: {features}'
          assert all(isinstance(v, (int, float)) for v in features), f'All features must be numeric, got: {features}'
          print(f'PASS /preprocess — {len(features)} features returned')
          "

      - name: Smoke test — /preprocess/batch
        run: |
          RESP=$(curl -sf -X POST http://localhost:8000/preprocess/batch \
            -H "Content-Type: application/json" \
            -d '{
              "data": [
                {
                  "objectId": "ZTF21a", "candid": 1,
                  "candidate": {"rb": 0.9, "drb": 0.85, "magpsf": 19.0, "isdiffpos": "t"}
                },
                {
                  "objectId": "ZTF21b", "candid": 2,
                  "candidate": {"rb": 0.1, "drb": 0.05, "magpsf": 18.0, "isdiffpos": "f"}
                }
              ]
            }')
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          results = d.get('features') or d.get('results') or d.get('data') or d
          assert isinstance(results, list), f'Expected a list, got: {type(results)}'
          assert len(results) == 2, f'Expected 2 results for 2 alerts, got {len(results)}'
          print(f'PASS /preprocess/batch — {len(results)} results returned')
          "

      - name: Show logs on failure
        if: failure()
        run: docker logs preprocessing-smoke

      - name: Cleanup
        if: always()
        run: |
          docker stop preprocessing-smoke 2>/dev/null || true
          docker rm   preprocessing-smoke 2>/dev/null || true
